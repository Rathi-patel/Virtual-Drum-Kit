<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Drum Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #080810; color: #e0d8cc; font-family: 'Oswald', sans-serif; min-height: 100vh; overflow-x: hidden; user-select: none; }

#bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

.beam { position: fixed; top: 0; width: 160px; height: 380px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); transform-origin: top center; pointer-events: none; z-index: 1; opacity: 0.13; animation: beamSway ease-in-out infinite; }
.beam-1 { left: 3%;   background: linear-gradient(to bottom, #ff4400aa, transparent); animation-duration: 8s;   animation-delay: 0s; }
.beam-2 { left: 20%;  background: linear-gradient(to bottom, #4488ffaa, transparent); animation-duration: 6.5s; animation-delay: -2s; }
.beam-3 { left: 44%;  background: linear-gradient(to bottom, #c8963eaa, transparent); animation-duration: 9s;   animation-delay: -1s; }
.beam-4 { left: 65%;  background: linear-gradient(to bottom, #44ffaaaa, transparent); animation-duration: 7s;   animation-delay: -3s; }
.beam-5 { right: 3%;  background: linear-gradient(to bottom, #ff44ccaa, transparent); animation-duration: 7.5s; animation-delay: -0.5s; }
@keyframes beamSway { 0%,100%{transform:rotate(-15deg);opacity:.09} 50%{transform:rotate(15deg);opacity:.2} }

.smoke { position: fixed; bottom: 0; left: -5%; right: -5%; height: 120px; background: linear-gradient(to top, rgba(12,8,28,0.75), transparent); pointer-events: none; z-index: 1; animation: smokeDrift 12s ease-in-out infinite alternate; }
@keyframes smokeDrift { 0%{transform:translateX(0) scaleX(1)} 100%{transform:translateX(1.5%) scaleX(1.05)} }

.shockwave { position: fixed; border-radius: 50%; pointer-events: none; z-index: 50; transform: translate(-50%,-50%) scale(0); animation: shockAnim 0.7s ease-out forwards; }
@keyframes shockAnim { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(-50%,-50%) scale(5.5);opacity:0} }

#hit-label { position: fixed; top: 44%; left: 50%; transform: translate(-50%,-50%); font-size: 30px; font-weight: 700; letter-spacing: 8px; color: #c8963e; text-shadow: 0 0 40px rgba(200,150,62,0.9); pointer-events: none; opacity: 0; transition: opacity 0.45s ease-out; z-index: 200; text-transform: uppercase; }

#app { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; padding-bottom: 28px; }

.page-title { text-align: center; padding: 18px 0 6px; }
.page-title h1 { font-size: 36px; font-weight: 700; letter-spacing: 14px; color: #c8963e; text-transform: uppercase; animation: titlePulse 4s ease-in-out infinite; }
.page-title p { font-size: 10px; letter-spacing: 4px; color: #444; margin-top: 3px; }
@keyframes titlePulse { 0%,100%{text-shadow:0 0 30px rgba(200,150,62,0.3)} 50%{text-shadow:0 0 70px rgba(200,150,62,0.8),0 0 130px rgba(200,150,62,0.25)} }

.kit-container { width: 100%; max-width: 1100px; padding: 0 10px; }
#kit-svg { width: 100%; height: auto; display: block; }

/* Drum hit flash via CSS */
.drum-hit { animation: drumFlash 0.18s ease-out forwards; }
@keyframes drumFlash { 0%{filter:brightness(2.5) saturate(2)} 100%{filter:brightness(1) saturate(1)} }

.controls { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 10px auto; padding: 10px 24px; background: rgba(16,16,22,0.92); backdrop-filter: blur(12px); border: 1px solid #222; border-radius: 5px; width: fit-content; }
.ctrl-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label { font-size: 10px; letter-spacing: 3px; color: #555; text-transform: uppercase; }
.bpm-val { font-family: 'Share Tech Mono', monospace; font-size: 22px; color: #c8963e; min-width: 46px; text-align: center; }
button.ctrl-btn { background: #181818; border: 1px solid #2a2a2a; color: #999; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; transition: all .1s; }
button.ctrl-btn:hover { background: #242424; color: #fff; }
button.ctrl-btn:active { transform: scale(0.9); }
button.metro-btn { background: #181818; border: 1px solid #2a2a2a; color: #999; padding: 6px 18px; border-radius: 4px; cursor: pointer; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-family: 'Oswald', sans-serif; transition: all .15s; }
button.metro-btn:hover { background: #242424; color: #fff; }
button.metro-btn.active { background: #c8963e; border-color: #c8963e; color: #000; }
input[type=range].vol-slider { -webkit-appearance: none; width: 90px; height: 3px; background: #2a2a2a; border-radius: 2px; outline: none; }
input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #c8963e; cursor: pointer; }

.viz-wrap { width: 100%; max-width: 1100px; padding: 0 10px; margin-bottom: 12px; }
#viz-canvas { width: 100%; height: 48px; background: rgba(10,10,16,0.9); border: 1px solid #1e1e1e; border-radius: 4px; display: block; }

.legend { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
.legend-item { font-size: 9px; letter-spacing: 2px; color: #444; text-transform: uppercase; background: rgba(16,16,22,0.88); border: 1px solid #1e1e1e; padding: 3px 9px; border-radius: 2px; }
.legend-item span { color: #c8963e; font-family: 'Share Tech Mono', monospace; font-size: 10px; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="beam beam-1"></div><div class="beam beam-2"></div><div class="beam beam-3"></div><div class="beam beam-4"></div><div class="beam beam-5"></div>
<div class="smoke"></div>

<div id="app">
  <div class="page-title">
    <h1>Drum Kit</h1>
    <p>click pads · use keyboard</p>
  </div>

  <div class="kit-container">
  <!--
    SVG viewBox: 1200 x 780
    Layout (overhead / slight perspective view):

    ROW 1 (top):   CRASH(left)   HH(center-left)   TOM1   TOM2   RIDE(right)
    ROW 2 (mid):               SNARE(left)   KICK(center)   FLOOR TOM(right)
    ROW 3 (btm):   Stage floor / kick pedal

    Positions (cx, cy):
      CRASH:     cx=120,  cy=140   rx=95  ry=18
      HI-HAT:    cx=310,  cy=165   rx=88  ry=16
      TOM1:      cx=480,  cy=155   rx=72  ry=16   (drum head top view)
      TOM2:      cx=640,  cy=155   rx=78  ry=17
      RIDE:      cx=1060, cy=145   rx=105 ry=20
      SNARE:     cx=270,  cy=380   rx=80  ry=18
      KICK:      cx=600,  cy=500   rx=175 ry=130  (big front view)
      FLOOR TOM: cx=950,  cy=430   rx=100 ry=26   (top view, bigger)
  -->
  <svg id="kit-svg" viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Maple shell gradient -->
      <radialGradient id="g-maple" cx="38%" cy="30%" r="70%">
        <stop offset="0%"   stop-color="#e89050"/>
        <stop offset="45%"  stop-color="#9a4a18"/>
        <stop offset="100%" stop-color="#3c1608"/>
      </radialGradient>
      <!-- Tom drum head (top view) -->
      <radialGradient id="g-head" cx="45%" cy="40%" r="60%">
        <stop offset="0%"   stop-color="#f8f3e8"/>
        <stop offset="65%"  stop-color="#ddd4bc"/>
        <stop offset="100%" stop-color="#b0a888"/>
      </radialGradient>
      <!-- Kick head -->
      <radialGradient id="g-kick-head" cx="48%" cy="42%" r="56%">
        <stop offset="0%"   stop-color="#f4efe2"/>
        <stop offset="60%"  stop-color="#d8d0bc"/>
        <stop offset="100%" stop-color="#a09880"/>
      </radialGradient>
      <!-- Kick shell -->
      <radialGradient id="g-kick-shell" cx="50%" cy="32%" r="68%">
        <stop offset="0%"   stop-color="#d07838"/>
        <stop offset="48%"  stop-color="#8a3f10"/>
        <stop offset="100%" stop-color="#3c1608"/>
      </radialGradient>
      <!-- Snare chrome -->
      <linearGradient id="g-snare-shell" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#777"/>
        <stop offset="28%"  stop-color="#ddd"/>
        <stop offset="55%"  stop-color="#bbb"/>
        <stop offset="100%" stop-color="#666"/>
      </linearGradient>
      <!-- Snare head -->
      <radialGradient id="g-snare-head" cx="45%" cy="38%" r="60%">
        <stop offset="0%"   stop-color="#f8f4ee"/>
        <stop offset="60%"  stop-color="#e0d8c4"/>
        <stop offset="100%" stop-color="#b8b09a"/>
      </radialGradient>
      <!-- Crash cymbal -->
      <radialGradient id="g-crash" cx="48%" cy="44%" r="56%">
        <stop offset="0%"   stop-color="#fff8a0"/>
        <stop offset="28%"  stop-color="#e8c020"/>
        <stop offset="68%"  stop-color="#a87808"/>
        <stop offset="100%" stop-color="#5a4004"/>
      </radialGradient>
      <!-- Hi-hat cymbal -->
      <radialGradient id="g-hihat" cx="48%" cy="44%" r="56%">
        <stop offset="0%"   stop-color="#fff090"/>
        <stop offset="28%"  stop-color="#d4b818"/>
        <stop offset="68%"  stop-color="#9a7008"/>
        <stop offset="100%" stop-color="#4e3803"/>
      </radialGradient>
      <!-- Ride cymbal -->
      <radialGradient id="g-ride" cx="48%" cy="44%" r="56%">
        <stop offset="0%"   stop-color="#fff080"/>
        <stop offset="30%"  stop-color="#d8b010"/>
        <stop offset="70%"  stop-color="#966808"/>
        <stop offset="100%" stop-color="#4a3803"/>
      </radialGradient>
      <!-- Floor tom shell -->
      <radialGradient id="g-floor-shell" cx="38%" cy="30%" r="70%">
        <stop offset="0%"   stop-color="#d48048"/>
        <stop offset="45%"  stop-color="#8a3e0e"/>
        <stop offset="100%" stop-color="#321408"/>
      </radialGradient>
      <!-- Shadow -->
      <radialGradient id="g-shadow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(0,0,0,0.55)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>
      <!-- Stand metal -->
      <linearGradient id="g-stand" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"  stop-color="#3a3a3a"/>
        <stop offset="50%" stop-color="#aaaaaa"/>
        <stop offset="100%" stop-color="#3a3a3a"/>
      </linearGradient>
    </defs>

    <!-- ══════════════════════════════════════════════
         STAGE FLOOR
    ══════════════════════════════════════════════ -->
    <rect x="0" y="680" width="1200" height="100" fill="#060609"/>
    <rect x="0" y="676" width="1200" height="8" fill="#111118"/>
    <!-- Floor reflection glow -->
    <ellipse cx="600" cy="690" rx="550" ry="30" fill="rgba(200,150,62,0.04)"/>

    <!-- ══════════════════════════════════════════════
         CRASH CYMBAL  —  cx=120, cy=140
    ══════════════════════════════════════════════ -->
    <!-- Stand legs -->
    <line x1="120" y1="300" x2="60"  y2="690" stroke="#3a3a3a" stroke-width="5" stroke-linecap="round"/>
    <line x1="120" y1="300" x2="170" y2="690" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
    <!-- Stand rod -->
    <rect x="116" y="155" width="8" height="160" rx="3" fill="url(#g-stand)"/>
    <!-- Tilt arm -->
    <line x1="120" y1="155" x2="136" y2="130" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="120" cy="156" rx="108" ry="22" fill="rgba(0,0,0,0.35)"/>
    <!-- Bottom cymbal (shadow layer) -->
    <ellipse cx="120" cy="148" rx="100" ry="19" fill="#604804" opacity="0.7"/>
    <!-- Main cymbal -->
    <ellipse cx="120" cy="138" rx="100" ry="19" fill="url(#g-crash)" id="p-crash"/>
    <!-- Bow rings -->
    <ellipse cx="120" cy="138" rx="80"  ry="15" fill="none" stroke="rgba(255,220,60,0.38)" stroke-width="1.5"/>
    <ellipse cx="120" cy="138" rx="56"  ry="11" fill="none" stroke="rgba(255,220,60,0.3)"  stroke-width="1.2"/>
    <ellipse cx="120" cy="138" rx="32"  ry="6"  fill="none" stroke="rgba(255,220,60,0.35)" stroke-width="1"/>
    <!-- Bell -->
    <ellipse cx="120" cy="134" rx="15"  ry="7"  fill="#fff8a0" stroke="#c8a010" stroke-width="1.5"/>
    <!-- Sheen -->
    <ellipse cx="88"  cy="130" rx="22"  ry="7"  fill="rgba(255,255,200,0.14)" transform="rotate(-10,88,130)"/>
    <!-- Edge rim -->
    <ellipse cx="120" cy="138" rx="100" ry="19" fill="none" stroke="rgba(255,240,100,0.18)" stroke-width="2"/>
    <!-- Label -->
    <text x="120" y="115" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="12" fill="rgba(200,160,50,0.6)" letter-spacing="2">CRASH [Q]</text>

    <!-- ══════════════════════════════════════════════
         HI-HAT  —  cx=330, cy=160
    ══════════════════════════════════════════════ -->
    <!-- Stand legs -->
    <line x1="330" y1="300" x2="268" y2="690" stroke="#3a3a3a" stroke-width="5" stroke-linecap="round"/>
    <line x1="330" y1="300" x2="385" y2="690" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
    <!-- Rod -->
    <rect x="326" y="175" width="8" height="160" rx="3" fill="url(#g-stand)"/>
    <!-- Pedal -->
    <rect x="304" y="682" width="58" height="14" rx="4" fill="#1c1c1c" stroke="#444" stroke-width="1"/>
    <text x="333" y="693" text-anchor="middle" font-family="Oswald,sans-serif" font-size="9" fill="#555" letter-spacing="1">PEDAL</text>
    <!-- Shadow -->
    <ellipse cx="330" cy="172" rx="100" ry="20" fill="rgba(0,0,0,0.35)"/>
    <!-- Bottom cymbal -->
    <ellipse cx="330" cy="166" rx="92"  ry="17" fill="#5e4604" opacity="0.75"/>
    <!-- Top cymbal (closed) -->
    <ellipse cx="330" cy="155" rx="92"  ry="17" fill="url(#g-hihat)" id="p-hihat-closed"/>
    <ellipse cx="330" cy="155" rx="74"  ry="14" fill="none" stroke="rgba(255,215,50,0.38)" stroke-width="1.5"/>
    <ellipse cx="330" cy="155" rx="50"  ry="9"  fill="none" stroke="rgba(255,215,50,0.3)"  stroke-width="1.2"/>
    <ellipse cx="330" cy="155" rx="28"  ry="5"  fill="none" stroke="rgba(255,215,50,0.35)" stroke-width="1"/>
    <ellipse cx="330" cy="151" rx="14"  ry="6"  fill="#fff5a0" stroke="#b89010" stroke-width="1.5"/>
    <ellipse cx="298" cy="148" rx="22"  ry="7"  fill="rgba(255,255,180,0.12)" transform="rotate(-10,298,148)"/>
    <ellipse cx="330" cy="155" rx="92"  ry="17" fill="none" stroke="rgba(255,235,80,0.18)" stroke-width="2"/>
    <!-- Open HH hit zone (transparent, larger) -->
    <ellipse cx="330" cy="155" rx="92" ry="17" fill="transparent" id="p-hihat-open" opacity="0"/>
    <text x="330" y="128" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="12" fill="rgba(200,160,50,0.6)" letter-spacing="2">HI-HAT [E]</text>

    <!-- ══════════════════════════════════════════════
         TOM 1 (HIGH)  —  cx=510, cy=170
         Overhead top-view: ellipse + shell ring below
    ══════════════════════════════════════════════ -->
    <!-- Mount arm from tom to centre -->
    <line x1="510" y1="185" x2="540" y2="230" stroke="#555" stroke-width="5" stroke-linecap="round"/>
    <line x1="540" y1="230" x2="580" y2="260" stroke="#555" stroke-width="4" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="510" cy="196" rx="82" ry="17" fill="rgba(0,0,0,0.4)"/>
    <!-- Shell top rim ellipse (visible depth) -->
    <ellipse cx="510" cy="195" rx="80" ry="16" fill="#9a4a18"/>
    <!-- Shell side band (thin strip) -->
    <rect x="430" y="183" width="160" height="20" rx="2" fill="url(#g-maple)" opacity="0.85"/>
    <!-- Drum head top -->
    <ellipse cx="510" cy="178" rx="80" ry="16" fill="url(#g-head)" id="p-tom1"/>
    <!-- Inner ring -->
    <ellipse cx="510" cy="178" rx="62" ry="12" fill="none" stroke="rgba(160,140,100,0.3)" stroke-width="1.5"/>
    <!-- Rim -->
    <ellipse cx="510" cy="178" rx="80" ry="16" fill="none" stroke="#c8963e" stroke-width="2.5"/>
    <!-- Lugs -->
    <rect x="432" y="174" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="560" y="174" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="464" y="163" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="538" y="163" width="8" height="12" rx="2" fill="#c8963e"/>
    <!-- Sheen -->
    <ellipse cx="488" cy="170" rx="22" ry="8" fill="rgba(255,255,255,0.12)" transform="rotate(-10,488,170)"/>
    <text x="510" y="148" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="12" fill="rgba(200,160,50,0.6)" letter-spacing="2">TOM 1 [A]</text>

    <!-- ══════════════════════════════════════════════
         TOM 2 (MID)  —  cx=680, cy=170
    ══════════════════════════════════════════════ -->
    <!-- Mount arm -->
    <line x1="680" y1="185" x2="650" y2="235" stroke="#555" stroke-width="5" stroke-linecap="round"/>
    <line x1="650" y1="235" x2="620" y2="265" stroke="#555" stroke-width="4" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="680" cy="198" rx="88" ry="18" fill="rgba(0,0,0,0.4)"/>
    <!-- Shell rim -->
    <ellipse cx="680" cy="196" rx="86" ry="17" fill="#8a3e10"/>
    <rect x="594" y="183" width="172" height="22" rx="2" fill="url(#g-maple)" opacity="0.85"/>
    <!-- Head -->
    <ellipse cx="680" cy="178" rx="86" ry="17" fill="url(#g-head)" id="p-tom2"/>
    <ellipse cx="680" cy="178" rx="68" ry="13" fill="none" stroke="rgba(160,140,100,0.3)" stroke-width="1.5"/>
    <ellipse cx="680" cy="178" rx="86" ry="17" fill="none" stroke="#c8963e" stroke-width="2.5"/>
    <rect x="596" y="174" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="756" y="174" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="634" y="162" width="8" height="12" rx="2" fill="#c8963e"/>
    <rect x="718" y="162" width="8" height="12" rx="2" fill="#c8963e"/>
    <ellipse cx="656" cy="170" rx="24" ry="8" fill="rgba(255,255,255,0.11)" transform="rotate(-10,656,170)"/>
    <text x="680" y="148" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="12" fill="rgba(200,160,50,0.6)" letter-spacing="2">TOM 2 [D]</text>

    <!-- ══════════════════════════════════════════════
         RIDE CYMBAL  —  cx=1060, cy=155
    ══════════════════════════════════════════════ -->
    <!-- Stand -->
    <line x1="1060" y1="310" x2="1000" y2="690" stroke="#3a3a3a" stroke-width="5" stroke-linecap="round"/>
    <line x1="1060" y1="310" x2="1110" y2="690" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
    <rect x="1056" y="168" width="8" height="155" rx="3" fill="url(#g-stand)"/>
    <!-- Tilt arm -->
    <line x1="1060" y1="168" x2="1040" y2="148" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="1060" cy="172" rx="118" ry="24" fill="rgba(0,0,0,0.35)"/>
    <!-- Ride is bigger / flatter -->
    <ellipse cx="1060" cy="165" rx="108" ry="21" fill="#5c4004" opacity="0.65"/>
    <ellipse cx="1060" cy="155" rx="108" ry="21" fill="url(#g-ride)" id="p-ride"/>
    <ellipse cx="1060" cy="155" rx="88"  ry="17" fill="none" stroke="rgba(255,215,50,0.38)" stroke-width="1.5"/>
    <ellipse cx="1060" cy="155" rx="62"  ry="12" fill="none" stroke="rgba(255,215,50,0.3)"  stroke-width="1.2"/>
    <ellipse cx="1060" cy="155" rx="36"  ry="7"  fill="none" stroke="rgba(255,215,50,0.35)" stroke-width="1"/>
    <ellipse cx="1060" cy="151" rx="16"  ry="7"  fill="#fff090" stroke="#b08808" stroke-width="1.5"/>
    <ellipse cx="1022" cy="147" rx="26"  ry="9"  fill="rgba(255,255,180,0.1)" transform="rotate(-10,1022,147)"/>
    <ellipse cx="1060" cy="155" rx="108" ry="21" fill="none" stroke="rgba(255,230,80,0.16)" stroke-width="2"/>
    <text x="1060" y="126" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="12" fill="rgba(200,160,50,0.6)" letter-spacing="2">RIDE [R]</text>

    <!-- ══════════════════════════════════════════════
         SNARE DRUM  —  cx=260, cy=430
    ══════════════════════════════════════════════ -->
    <!-- Stand legs -->
    <line x1="220" y1="500" x2="170" y2="690" stroke="#3a3a3a" stroke-width="5" stroke-linecap="round"/>
    <line x1="300" y1="500" x2="350" y2="690" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
    <line x1="260" y1="510" x2="260" y2="690" stroke="#444" stroke-width="4" stroke-linecap="round"/>
    <!-- Shadow -->
    <ellipse cx="260" cy="490" rx="94" ry="18" fill="rgba(0,0,0,0.45)"/>
    <!-- Chrome shell (cylinder band) -->
    <rect x="168" y="448" width="184" height="42" fill="url(#g-snare-shell)" rx="2"/>
    <!-- Shell bottom ellipse -->
    <ellipse cx="260" cy="490" rx="92" ry="17" fill="#888"/>
    <!-- Shell top rim -->

<script>
// ── BACKGROUND ──
const bgC = document.getElementById('bg-canvas');
const bgX = bgC.getContext('2d');
let W = bgC.width = window.innerWidth;
let H = bgC.height = window.innerHeight;
window.addEventListener('resize', () => { W = bgC.width = innerWidth; H = bgC.height = innerHeight; });

const COLS = ['#c8963e','#ff5500','#3388ff','#44ffbb','#ff44cc','#ffee44'];
const pts = []; for (let i=0;i<110;i++) pts.push(mkP(true));
function mkP(r){ return { x:Math.random()*W, y:r?Math.random()*H:H+6, vx:(Math.random()-.5)*.3, vy:-(Math.random()*.5+.15), rad:Math.random()*2+.3, a:Math.random()*.45+.08, col:COLS[Math.floor(Math.random()*COLS.length)], life:1, decay:Math.random()*.0018+.0006 }; }

const bursts=[], glows=[];
function spawnBurst(x,y,col,n){ for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*5+1.5;bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,r:Math.random()*3+1,a:1,col,decay:Math.random()*.028+.018});} }
function spawnGlow(x,y,col){ glows.push({x,y,col,r:10,a:.5,spd:5}); }

function bgLoop(){
  bgX.fillStyle='#080810'; bgX.fillRect(0,0,W,H);
  const atm=bgX.createRadialGradient(W/2,H*.6,0,W/2,H*.6,W*.7);
  atm.addColorStop(0,'rgba(22,10,4,1)');atm.addColorStop(.7,'rgba(5,4,14,.95)');atm.addColorStop(1,'rgba(0,0,0,0)');
  bgX.fillStyle=atm;bgX.fillRect(0,0,W,H);
  bgX.strokeStyle='rgba(200,150,62,.025)';bgX.lineWidth=1;
  for(let x2=0;x2<W;x2+=55){bgX.beginPath();bgX.moveTo(x2,0);bgX.lineTo(x2,H);bgX.stroke();}
  for(let y2=0;y2<H;y2+=55){bgX.beginPath();bgX.moveTo(0,y2);bgX.lineTo(W,y2);bgX.stroke();}
  for(let i=glows.length-1;i>=0;i--){const g=glows[i];const gr=bgX.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);gr.addColorStop(0,g.col);gr.addColorStop(1,'transparent');bgX.save();bgX.globalAlpha=g.a*.55;bgX.globalCompositeOperation='lighter';bgX.fillStyle=gr;bgX.beginPath();bgX.arc(g.x,g.y,g.r,0,Math.PI*2);bgX.fill();bgX.restore();g.r+=g.spd;g.spd*=.96;g.a-=.013;if(g.a<=0)glows.splice(i,1);}
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];bgX.save();bgX.globalAlpha=p.a*p.life;bgX.fillStyle=p.col;bgX.beginPath();bgX.arc(p.x,p.y,p.rad,0,Math.PI*2);bgX.fill();bgX.restore();p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0||p.y<-6)pts[i]=mkP(false);}
  for(let i=bursts.length-1;i>=0;i--){const b=bursts[i];bgX.save();bgX.globalAlpha=b.a;bgX.globalCompositeOperation='lighter';bgX.fillStyle=b.col;bgX.beginPath();bgX.arc(b.x,b.y,b.r,0,Math.PI*2);bgX.fill();bgX.restore();b.x+=b.vx;b.y+=b.vy;b.vy+=.09;b.a-=b.decay;if(b.a<=0)bursts.splice(i,1);}
  requestAnimationFrame(bgLoop);
}
bgLoop();

// ── SHOCKWAVE ──
function emitShockwave(cx,cy,col){
  for(let i=0;i<2;i++){const d=document.createElement('div');d.className='shockwave';d.style.cssText=`left:${cx}px;top:${cy}px;width:60px;height:60px;border:2px solid ${col};animation-delay:${i*.15}s;opacity:${1-i*.45}`;document.body.appendChild(d);setTimeout(()=>d.remove(),900);}
}

// ── AUDIO ──
let AC=null,MG=null,AN=null;
function getAC(){
  if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();MG=AC.createGain();AN=AC.createAnalyser();AN.fftSize=256;MG.connect(AN);AN.connect(AC.destination);MG.gain.value=parseFloat(document.getElementById('volSlider').value);}
  if(AC.state==='suspended')AC.resume();return AC;
}
function noise(ac,d){const b=ac.createBuffer(2,Math.floor(ac.sampleRate*d),ac.sampleRate);for(let c=0;c<2;c++){const a=b.getChannelData(c);for(let i=0;i<a.length;i++)a[i]=Math.random()*2-1;}return b;}

function playKick(){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain(),ws=ac.createWaveShaper();const cv=new Float32Array(256);for(let i=0;i<256;i++){const x=(i*2)/256-1;cv[i]=(Math.PI+200)*x/(Math.PI+200*Math.abs(x));}ws.curve=cv;o1.type='sine';o2.type='sine';o1.frequency.setValueAtTime(160,t);o1.frequency.exponentialRampToValueAtTime(.001,t+.5);o2.frequency.setValueAtTime(80,t);o2.frequency.exponentialRampToValueAtTime(.001,t+.4);g.gain.setValueAtTime(1.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o1.connect(ws);o2.connect(ws);ws.connect(g);g.connect(MG);const n=ac.createBufferSource();n.buffer=noise(ac,.04);const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=200;nf.Q.value=.5;const ng=ac.createGain();ng.gain.setValueAtTime(.8,t);ng.gain.exponentialRampToValueAtTime(.001,t+.04);n.connect(nf);nf.connect(ng);ng.connect(MG);n.start(t);n.stop(t+.04);o1.start(t);o2.start(t);o1.stop(t+.6);o2.stop(t+.6);}
function playSnare(){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(250,t);o.frequency.exponentialRampToValueAtTime(100,t+.1);const og=ac.createGain();og.gain.setValueAtTime(.7,t);og.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(og);og.connect(MG);o.start(t);o.stop(t+.15);const n=ac.createBufferSource();n.buffer=noise(ac,.25);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=1800;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=4000;f2.Q.value=.7;const ng=ac.createGain();ng.gain.setValueAtTime(.8,t);ng.gain.exponentialRampToValueAtTime(.001,t+.22);n.connect(f1);f1.connect(f2);f2.connect(ng);ng.connect(MG);n.start(t);n.stop(t+.25);const c=ac.createOscillator();c.type='square';c.frequency.value=1800;const cg=ac.createGain();cg.gain.setValueAtTime(.4,t);cg.gain.exponentialRampToValueAtTime(.001,t+.025);c.connect(cg);cg.connect(MG);c.start(t);c.stop(t+.03);}
function playHHC(){const ac=getAC(),t=ac.currentTime;const n=ac.createBufferSource();n.buffer=noise(ac,.08);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=8000;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=10000;f2.Q.value=1.5;const g=ac.createGain();g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);n.connect(f1);f1.connect(f2);f2.connect(g);g.connect(MG);n.start(t);n.stop(t+.08);}
function playHHO(){const ac=getAC(),t=ac.currentTime;const n=ac.createBufferSource();n.buffer=noise(ac,.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=7000;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=9000;f2.Q.value=.8;const g=ac.createGain();g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);n.connect(f1);f1.connect(f2);f2.connect(g);g.connect(MG);n.start(t);n.stop(t+.5);}
function playTom(fr,dc){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();o1.type='sine';o2.type='triangle';o1.frequency.setValueAtTime(fr*1.5,t);o1.frequency.exponentialRampToValueAtTime(fr*.5,t+dc);o2.frequency.setValueAtTime(fr,t);o2.frequency.exponentialRampToValueAtTime(fr*.3,t+dc);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.001,t+dc+.05);o1.connect(g);o2.connect(g);g.connect(MG);const n=ac.createBufferSource();n.buffer=noise(ac,.05);const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=fr*2;nf.Q.value=1;const ng=ac.createGain();ng.gain.setValueAtTime(.3,t);ng.gain.exponentialRampToValueAtTime(.001,t+.05);n.connect(nf);nf.connect(ng);ng.connect(MG);n.start(t);n.stop(t+.05);o1.start(t);o2.start(t);o1.stop(t+dc+.05);o2.stop(t+dc+.05);}
function playCrash(){const ac=getAC(),t=ac.currentTime;[160,200,240,300,400,520].forEach(f=>{const o=ac.createOscillator();o.type='sawtooth';o.frequency.value=f+Math.random()*40;const g=ac.createGain();g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+1.5);o.connect(g);g.connect(MG);o.start(t);o.stop(t+1.5);});const n=ac.createBufferSource();n.buffer=noise(ac,1.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=5000;const g=ac.createGain();g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+1.4);n.connect(f1);f1.connect(g);g.connect(MG);n.start(t);n.stop(t+1.5);}
function playRide(){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),o3=ac.createOscillator(),g=ac.createGain();o1.type='sine';o1.frequency.value=1800;o2.type='sine';o2.frequency.value=2400;o3.type='triangle';o3.frequency.value=3200;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.8);o1.connect(g);o2.connect(g);o3.connect(g);g.connect(MG);o1.start(t);o2.start(t);o3.start(t);o1.stop(t+.8);o2.stop(t+.8);o3.stop(t+.8);const n=ac.createBufferSource();n.buffer=noise(ac,.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=9000;const ng=ac.createGain();ng.gain.setValueAtTime(.2,t);ng.gain.exponentialRampToValueAtTime(.001,t+.5);n.connect(f1);f1.connect(ng);ng.connect(MG);n.start(t);n.stop(t+.5);}

// ── DRUM MAP ──
const drumMap = {
  'drum-kick':         { play:playKick,             label:'KICK',        col:'#d07838', n:44, vis:'p-kick' },
  'drum-snare':        { play:playSnare,            label:'SNARE',       col:'#dddddd', n:28, vis:'p-snare' },
  'drum-hihat-closed': { play:playHHC,              label:'HI-HAT',      col:'#d4b818', n:16, vis:'p-hihat-closed' },
  'drum-hihat-open':   { play:playHHO,              label:'HI-HAT OPEN', col:'#d4b818', n:20, vis:'p-hihat-closed' },
  'drum-tom1':         { play:()=>playTom(340,.28), label:'HIGH TOM',    col:'#d06030', n:22, vis:'p-tom1' },
  'drum-tom2':         { play:()=>playTom(230,.33), label:'MID TOM',     col:'#c05020', n:25, vis:'p-tom2' },
  'drum-floortom':     { play:()=>playTom(120,.48), label:'FLOOR TOM',   col:'#b03a18', n:32, vis:'p-floortom' },
  'drum-crash':        { play:playCrash,            label:'CRASH',       col:'#e8c020', n:55, vis:'p-crash' },
  'drum-ride':         { play:playRide,             label:'RIDE',        col:'#d8b010', n:30, vis:'p-ride' },
  'drum-pedal':        { play:playKick,             label:'KICK',        col:'#d07838', n:44, vis:'p-kick' },
};

const keyMap = { 'Space':'drum-kick','KeyS':'drum-snare','KeyE':'drum-hihat-closed','KeyW':'drum-hihat-open','KeyA':'drum-tom1','KeyD':'drum-tom2','KeyF':'drum-floortom','KeyQ':'drum-crash','KeyR':'drum-ride' };

let labTO=null;
const hitLab=document.getElementById('hit-label');
function showLabel(t){hitLab.textContent=t;hitLab.style.opacity='1';clearTimeout(labTO);labTO=setTimeout(()=>{hitLab.style.opacity='0';},550);}

// SVG flash glow
const svgEl = document.getElementById('kit-svg');
const svgNS = 'http://www.w3.org/2000/svg';
function flashDrum(visId, col) {
  const target = document.getElementById(visId); if(!target) return;
  // Inject a temporary glow ellipse matching the visual element
  const clone = target.cloneNode(false);
  clone.removeAttribute('id');
  clone.setAttribute('fill', col);
  clone.setAttribute('fill-opacity', '0.55');
  clone.setAttribute('pointer-events', 'none');
  clone.style.transition = 'fill-opacity 0.3s ease-out';
  target.parentNode.insertBefore(clone, target.nextSibling);
  requestAnimationFrame(() => { requestAnimationFrame(() => { clone.setAttribute('fill-opacity','0'); }); });
  setTimeout(() => clone.remove(), 400);
  // Also brighten the original
  target.style.filter = 'brightness(2) saturate(1.8)';
  setTimeout(() => { target.style.filter = ''; }, 180);
}

function triggerDrum(id, cx, cy){
  const d=drumMap[id]; if(!d) return;
  d.play();
  showLabel(d.label);
  flashDrum(d.vis, d.col);
  const x=cx||W/2, y=cy||H*.5;
  emitShockwave(x,y,d.col);
  spawnBurst(x,y,d.col,d.n);
  spawnGlow(x,y,d.col);
}

document.querySelectorAll('.drum-clickable').forEach(el=>{
  el.addEventListener('mousedown', e=>{ e.preventDefault(); triggerDrum(el.id, e.clientX, e.clientY); });
  el.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; triggerDrum(el.id,t.clientX,t.clientY); },{passive:false});
});
document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.code==='Space') e.preventDefault();
  const id=keyMap[e.code]; if(id) triggerDrum(id,W/2,H*.5);
});
document.getElementById('volSlider').addEventListener('input',e=>{ if(MG) MG.gain.value=parseFloat(e.target.value); });

// BPM
let bpm=120,metroOn=false,metroT=null,beat=0;
const bpmEl=document.getElementById('bpmDisplay');
document.getElementById('bpmDown').addEventListener('click',()=>{ bpm=Math.max(30,bpm-5);bpmEl.textContent=bpm;if(metroOn)restart(); });
document.getElementById('bpmUp').addEventListener('click',  ()=>{ bpm=Math.min(300,bpm+5);bpmEl.textContent=bpm;if(metroOn)restart(); });
function metroTick(){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=beat%4===0?1100:880;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(MG);o.start(t);o.stop(t+.05);beat++;metroT=setTimeout(metroTick,60000/bpm);}
function restart(){clearTimeout(metroT);beat=0;metroTick();}
document.getElementById('metroBtn').addEventListener('click',()=>{
  metroOn=!metroOn;const b=document.getElementById('metroBtn');
  if(metroOn){b.classList.add('active');b.textContent='■ Metronome';restart();}
  else{b.classList.remove('active');b.textContent='▶ Metronome';clearTimeout(metroT);}
});

// Waveform
const vc=document.getElementById('viz-canvas'),vx=vc.getContext('2d');
function drawViz(){
  requestAnimationFrame(drawViz);
  vx.fillStyle='rgba(8,8,16,.92)';vx.fillRect(0,0,vc.width,vc.height);
  if(!AN)return;
  const data=new Uint8Array(AN.frequencyBinCount);AN.getByteTimeDomainData(data);
  vx.lineWidth=2;vx.strokeStyle='#c8963e';vx.shadowColor='#c8963e';vx.shadowBlur=8;
  vx.beginPath();const step=vc.width/data.length;
  for(let i=0;i<data.length;i++){const y=(data[i]/128)*(vc.height/2);i===0?vx.moveTo(0,y):vx.lineTo(i*step,y);}
  vx.stroke();vx.shadowBlur=0;
}
drawViz();
</script>
