<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Drum Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #c8963e; --surface: #161616; --border: #2a2a2a; --muted: #555; }
html, body { background: #000; color: #e0d8cc; font-family: 'Oswald', sans-serif; min-height: 100vh; overflow-x: hidden; }

#bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

.stage-lights { position: fixed; top: 0; left: 0; right: 0; height: 300px; z-index: 1; pointer-events: none; display: flex; justify-content: space-around; align-items: flex-start; }
.light-beam { width: 110px; transform-origin: top center; opacity: 0.18; animation: beamSway 6s ease-in-out infinite; }
.light-beam:nth-child(1){animation-delay:0s;animation-duration:7s}
.light-beam:nth-child(2){animation-delay:1.2s;animation-duration:5.5s}
.light-beam:nth-child(3){animation-delay:0.5s;animation-duration:8s}
.light-beam:nth-child(4){animation-delay:2s;animation-duration:6s}
.light-beam:nth-child(5){animation-delay:0.8s;animation-duration:7.5s}
@keyframes beamSway { 0%,100%{transform:rotate(-14deg);opacity:.14} 50%{transform:rotate(14deg);opacity:.28} }

.smoke-layer { position: fixed; bottom: 0; left: -10%; right: -10%; height: 140px; background: linear-gradient(to top, rgba(20,15,35,0.6) 0%, transparent 100%); z-index: 1; pointer-events: none; animation: smokeDrift 10s ease-in-out infinite alternate; }
@keyframes smokeDrift { 0%{transform:scaleX(1) translateX(0)} 100%{transform:scaleX(1.06) translateX(2%)} }

.shockwave { position: fixed; border-radius: 50%; border: 2px solid rgba(200,150,62,0.8); transform: translate(-50%,-50%) scale(0); pointer-events: none; z-index: 5; animation: shockwaveAnim 0.65s ease-out forwards; }
@keyframes shockwaveAnim { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(-50%,-50%) scale(5);opacity:0} }

#app { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
header { width: 100%; text-align: center; padding: 20px 0 4px; letter-spacing: 8px; font-size: 11px; font-weight: 300; color: var(--muted); text-transform: uppercase; }
h1 { font-size: 36px; font-weight: 600; letter-spacing: 12px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; animation: titlePulse 4s ease-in-out infinite; }
@keyframes titlePulse {
  0%,100% { text-shadow: 0 0 40px rgba(200,150,62,0.4), 0 0 80px rgba(200,150,62,0.1); }
  50%      { text-shadow: 0 0 80px rgba(200,150,62,0.8), 0 0 160px rgba(200,150,62,0.3); }
}

.kit-container { width: 100%; max-width: 900px; padding: 0 12px; position: relative; }
#kit-svg { width: 100%; height: auto; display: block; }

.controls { display: flex; align-items: center; gap: 20px; margin: 14px auto; padding: 10px 22px; background: rgba(20,20,20,0.88); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 4px; width: fit-content; flex-wrap: wrap; justify-content: center; }
.ctrl-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
.bpm-val { font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--accent); min-width: 44px; text-align: center; }
button.ctrl-btn { background: #1e1e1e; border: 1px solid var(--border); color: #aaa; width: 28px; height: 28px; border-radius: 3px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Oswald',sans-serif; transition: all 0.1s; }
button.ctrl-btn:hover { background: #2a2a2a; color: #fff; }
button.ctrl-btn:active { transform: scale(0.92); }
button.metro-btn { background: #1e1e1e; border: 1px solid var(--border); color: #aaa; padding: 6px 18px; border-radius: 3px; cursor: pointer; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-family: 'Oswald',sans-serif; transition: all 0.15s; }
button.metro-btn:hover { background: #2a2a2a; color: #fff; }
button.metro-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
input[type=range].vol-slider { -webkit-appearance: none; width: 80px; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
input[type=range].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

.viz-wrap { width: 100%; max-width: 900px; padding: 0 12px; margin-bottom: 14px; }
#viz-canvas { width: 100%; height: 52px; background: rgba(14,14,14,0.88); border: 1px solid var(--border); border-radius: 3px; display: block; }

.legend { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; padding: 0 12px; }
.legend-item { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; background: rgba(20,20,20,0.82); backdrop-filter: blur(4px); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; }
.legend-item span { color: var(--accent); font-family: 'Share Tech Mono',monospace; font-size: 11px; }

#hit-label { position: fixed; top: 44%; left: 50%; transform: translate(-50%,-50%); font-family: 'Oswald',sans-serif; font-size: 30px; font-weight: 600; letter-spacing: 8px; color: var(--accent); pointer-events: none; opacity: 0; transition: opacity 0.45s ease-out; z-index: 200; text-transform: uppercase; }
</style>
</head>

  <svg class="light-beam" viewBox="0 0 110 300"><defs><linearGradient id="b3" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#c8963e" stop-opacity=".95"/><stop offset="100%" stop-color="#c8963e" stop-opacity="0"/></linearGradient></defs><polygon points="55,0 0,300 110,300" fill="url(#b3)"/></svg>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">BPM</span>
      <button class="ctrl-btn" id="bpmDown">−</button>
      <span class="bpm-val" id="bpmDisplay">120</span>
      <button class="ctrl-btn" id="bpmUp">+</button>
    </div>
    <button class="metro-btn" id="metroBtn">▶ Metronome</button>
    <div class="ctrl-group">
      <span class="ctrl-label">Vol</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="0.8"/>
    </div>
  </div>

  <div class="viz-wrap">
    <canvas id="viz-canvas" width="876" height="52"></canvas>
  </div>

  <div class="legend">
    <div class="legend-item"><span>Q</span> Crash</div>
    <div class="legend-item"><span>W</span> Hi-Hat Open</div>
    <div class="legend-item"><span>E</span> Hi-Hat Closed</div>
    <div class="legend-item"><span>R</span> Ride</div>
    <div class="legend-item"><span>A</span> Tom 1</div>
    <div class="legend-item"><span>S</span> Snare</div>
    <div class="legend-item"><span>D</span> Tom 2</div>
    <div class="legend-item"><span>F</span> Floor Tom</div>
    <div class="legend-item"><span>SPACE</span> Kick</div>
  </div>
</div>

<div id="hit-label"></div>

<script>
// ===================== ANIMATED BACKGROUND =====================
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let W = bgCanvas.width  = window.innerWidth;
let H = bgCanvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = bgCanvas.width = window.innerWidth; H = bgCanvas.height = window.innerHeight; });

// Floating particles
const PCOUNT = 110;
const particles = [];
const pColors = ['#c8963e','#ff5500','#3388ff','#44ffbb','#ff44cc','#ffee44','#ff8844'];
function mkParticle(randomY) {
  return {
    x: Math.random() * W,
    y: randomY ? Math.random() * H : H + 8,
    vx: (Math.random() - 0.5) * 0.35,
    vy: -(Math.random() * 0.55 + 0.15),
    r:  Math.random() * 2 + 0.3,
    a:  Math.random() * 0.5 + 0.08,
    color: pColors[Math.floor(Math.random() * pColors.length)],
    life: 1,
    decay: Math.random() * 0.0018 + 0.0006,
  };
}
for (let i = 0; i < PCOUNT; i++) particles.push(mkParticle(true));

// Hit burst particles
const bursts = [];
function spawnBurst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 1.5;
    bursts.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2.5, r: Math.random()*3+1, a: 1, color: col, decay: Math.random()*0.028+0.018 });
  }
}

// Glow circles on hit
const glows = [];
function spawnGlow(x, y, col) {
  glows.push({ x, y, color: col, r: 10, a: 0.55, spd: 5 });
}

// Grid lines (subtle concert-floor effect)
function drawGrid() {
  bgCtx.save();
  bgCtx.strokeStyle = 'rgba(200,150,62,0.03)';
  bgCtx.lineWidth = 1;
  const spacing = 60;
  for (let x2 = 0; x2 < W; x2 += spacing) {
    bgCtx.beginPath(); bgCtx.moveTo(x2, 0); bgCtx.lineTo(x2, H); bgCtx.stroke();
  }
  for (let y2 = 0; y2 < H; y2 += spacing) {
    bgCtx.beginPath(); bgCtx.moveTo(0, y2); bgCtx.lineTo(W, y2); bgCtx.stroke();
  }
  bgCtx.restore();
}

function bgLoop() {
  // Deep dark bg
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, W, H);

  // Radial atmosphere
  const atm = bgCtx.createRadialGradient(W/2, H*0.55, 0, W/2, H*0.55, W*0.7);
  atm.addColorStop(0, 'rgba(18,9,3,1)');
  atm.addColorStop(0.6, 'rgba(6,4,12,1)');
  atm.addColorStop(1, 'rgba(0,0,0,1)');
  bgCtx.fillStyle = atm;
  bgCtx.fillRect(0, 0, W, H);

  drawGrid();

  // Floor glow
  const fg = bgCtx.createLinearGradient(0, H*0.78, 0, H);
  fg.addColorStop(0, 'rgba(200,150,60,0.05)');
  fg.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = fg;
  bgCtx.fillRect(0, H*0.78, W, H*0.22);

  // Glow pulses
  for (let i = glows.length-1; i >= 0; i--) {
    const g = glows[i];
    bgCtx.save();
    bgCtx.globalCompositeOperation = 'lighter';
    const gr = bgCtx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r);
    gr.addColorStop(0, g.color + 'aa');
    gr.addColorStop(0.4, g.color + '44');
    gr.addColorStop(1, 'transparent');
    bgCtx.globalAlpha = g.a;
    bgCtx.fillStyle = gr;
    bgCtx.beginPath();
    bgCtx.arc(g.x, g.y, g.r, 0, Math.PI*2);
    bgCtx.fill();
    bgCtx.restore();
    g.r += g.spd; g.spd *= 0.96; g.a -= 0.013;
    if (g.a <= 0) glows.splice(i, 1);
  }

  // Ambient particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    bgCtx.save();
    bgCtx.globalAlpha = p.a * p.life;
    bgCtx.fillStyle = p.color;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    bgCtx.fill();
    bgCtx.restore();
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0 || p.y < -8) particles[i] = mkParticle(false);
  }

  // Burst particles
  for (let i = bursts.length-1; i >= 0; i--) {
    const b = bursts[i];
    bgCtx.save();
    bgCtx.globalAlpha = b.a;
    bgCtx.globalCompositeOperation = 'lighter';
    bgCtx.fillStyle = b.color;
    bgCtx.beginPath();
    bgCtx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    bgCtx.fill();
    bgCtx.restore();
    b.x += b.vx; b.y += b.vy; b.vy += 0.09; b.a -= b.decay;
    if (b.a <= 0) bursts.splice(i, 1);
  }

  requestAnimationFrame(bgLoop);
}
bgLoop();

// ===================== SHOCKWAVE =====================
function emitShockwave(cx, cy, color) {
  for (let i = 0; i < 2; i++) {
    const d = document.createElement('div');
    d.className = 'shockwave';
    d.style.cssText = `left:${cx}px;top:${cy}px;width:60px;height:60px;border-color:${color};animation-delay:${i*0.14}s;opacity:${1-i*0.4}`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 900);
  }
}

// ===================== AUDIO ENGINE =====================
let AC = null, masterGain = null, analyser = null;
function getAC() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    analyser   = AC.createAnalyser(); analyser.fftSize = 256;
    masterGain.connect(analyser); analyser.connect(AC.destination);
    masterGain.gain.value = parseFloat(document.getElementById('volSlider').value);
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function noise(ac, dur) {
  const b = ac.createBuffer(2, Math.floor(ac.sampleRate*dur), ac.sampleRate);
  for (let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
  return b;
}
function playKick(){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain(),ws=ac.createWaveShaper();const cv=new Float32Array(256);for(let i=0;i<256;i++){const x=(i*2)/256-1;cv[i]=(Math.PI+200)*x/(Math.PI+200*Math.abs(x));}ws.curve=cv;o1.type='sine';o2.type='sine';o1.frequency.setValueAtTime(160,t);o1.frequency.exponentialRampToValueAtTime(0.001,t+.5);o2.frequency.setValueAtTime(80,t);o2.frequency.exponentialRampToValueAtTime(0.001,t+.4);g.gain.setValueAtTime(1.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+.6);o1.connect(ws);o2.connect(ws);ws.connect(g);g.connect(masterGain);const n=ac.createBufferSource();n.buffer=noise(ac,.04);const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=200;nf.Q.value=.5;const ng=ac.createGain();ng.gain.setValueAtTime(.8,t);ng.gain.exponentialRampToValueAtTime(.001,t+.04);n.connect(nf);nf.connect(ng);ng.connect(masterGain);n.start(t);n.stop(t+.04);o1.start(t);o2.start(t);o1.stop(t+.6);o2.stop(t+.6);}
function playSnare(){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(250,t);o.frequency.exponentialRampToValueAtTime(100,t+.1);const og=ac.createGain();og.gain.setValueAtTime(.7,t);og.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(og);og.connect(masterGain);o.start(t);o.stop(t+.15);const n=ac.createBufferSource();n.buffer=noise(ac,.25);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=1800;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=4000;f2.Q.value=.7;const ng=ac.createGain();ng.gain.setValueAtTime(.8,t);ng.gain.exponentialRampToValueAtTime(.001,t+.22);n.connect(f1);f1.connect(f2);f2.connect(ng);ng.connect(masterGain);n.start(t);n.stop(t+.25);const c=ac.createOscillator();c.type='square';c.frequency.value=1800;const cg=ac.createGain();cg.gain.setValueAtTime(.4,t);cg.gain.exponentialRampToValueAtTime(.001,t+.025);c.connect(cg);cg.connect(masterGain);c.start(t);c.stop(t+.03);}
function playHHC(){const ac=getAC(),t=ac.currentTime;const n=ac.createBufferSource();n.buffer=noise(ac,.08);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=8000;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=10000;f2.Q.value=1.5;const g=ac.createGain();g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);n.connect(f1);f1.connect(f2);f2.connect(g);g.connect(masterGain);n.start(t);n.stop(t+.08);}
function playHHO(){const ac=getAC(),t=ac.currentTime;const n=ac.createBufferSource();n.buffer=noise(ac,.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=7000;const f2=ac.createBiquadFilter();f2.type='bandpass';f2.frequency.value=9000;f2.Q.value=.8;const g=ac.createGain();g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);n.connect(f1);f1.connect(f2);f2.connect(g);g.connect(masterGain);n.start(t);n.stop(t+.5);}
function playTom(fr,dc){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain();o1.type='sine';o2.type='triangle';o1.frequency.setValueAtTime(fr*1.5,t);o1.frequency.exponentialRampToValueAtTime(fr*.5,t+dc);o2.frequency.setValueAtTime(fr,t);o2.frequency.exponentialRampToValueAtTime(fr*.3,t+dc);g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.001,t+dc+.05);o1.connect(g);o2.connect(g);g.connect(masterGain);const n=ac.createBufferSource();n.buffer=noise(ac,.05);const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=fr*2;nf.Q.value=1;const ng=ac.createGain();ng.gain.setValueAtTime(.3,t);ng.gain.exponentialRampToValueAtTime(.001,t+.05);n.connect(nf);nf.connect(ng);ng.connect(masterGain);n.start(t);n.stop(t+.05);o1.start(t);o2.start(t);o1.stop(t+dc+.05);o2.stop(t+dc+.05);}
function playCrash(){const ac=getAC(),t=ac.currentTime;[160,200,240,300,400,520].forEach(f=>{const o=ac.createOscillator();o.type='sawtooth';o.frequency.value=f+Math.random()*40;const g=ac.createGain();g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+1.5);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+1.5);});const n=ac.createBufferSource();n.buffer=noise(ac,1.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=5000;const g=ac.createGain();g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+1.4);n.connect(f1);f1.connect(g);g.connect(masterGain);n.start(t);n.stop(t+1.5);}
function playRide(){const ac=getAC(),t=ac.currentTime;const o1=ac.createOscillator(),o2=ac.createOscillator(),o3=ac.createOscillator(),g=ac.createGain();o1.type='sine';o1.frequency.value=1800;o2.type='sine';o2.frequency.value=2400;o3.type='triangle';o3.frequency.value=3200;g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.8);o1.connect(g);o2.connect(g);o3.connect(g);g.connect(masterGain);o1.start(t);o2.start(t);o3.start(t);o1.stop(t+.8);o2.stop(t+.8);o3.stop(t+.8);const n=ac.createBufferSource();n.buffer=noise(ac,.5);const f1=ac.createBiquadFilter();f1.type='highpass';f1.frequency.value=9000;const ng=ac.createGain();ng.gain.setValueAtTime(.2,t);ng.gain.exponentialRampToValueAtTime(.001,t+.5);n.connect(f1);f1.connect(ng);ng.connect(masterGain);n.start(t);n.stop(t+.5);}

// ===================== DRUM MAP =====================
const drumMap = {
  'drum-kick':         { play:playKick,              label:'KICK',        color:'#e8832a', bursts:42 },
  'drum-snare':        { play:playSnare,             label:'SNARE',       color:'#eeeeee', bursts:28 },
  'drum-hihat-closed': { play:playHHC,               label:'HI-HAT',      color:'#3399ff', bursts:14 },
  'drum-hihat-open':   { play:playHHO,               label:'HI-HAT OPEN', color:'#55bbff', bursts:20 },
  'drum-tom1':         { play:()=>playTom(340,.28),  label:'HIGH TOM',    color:'#ff7744', bursts:22 },
  'drum-tom2':         { play:()=>playTom(230,.32),  label:'MID TOM',     color:'#ff5522', bursts:25 },
  'drum-floortom':     { play:()=>playTom(130,.45),  label:'FLOOR TOM',   color:'#ff3300', bursts:32 },
  'drum-crash':        { play:playCrash,             label:'CRASH',       color:'#ffee44', bursts:55 },
  'drum-ride':         { play:playRide,              label:'RIDE',        color:'#ffdd22', bursts:30 },
  'drum-pedal':        { play:playKick,              label:'KICK',        color:'#e8832a', bursts:42 },
};
const keyMap = { 'Space':'drum-kick','KeyS':'drum-snare','KeyE':'drum-hihat-closed','KeyW':'drum-hihat-open','KeyA':'drum-tom1','KeyD':'drum-tom2','KeyF':'drum-floortom','KeyQ':'drum-crash','KeyR':'drum-ride' };

function triggerDrum(id, cx, cy) {
  const d = drumMap[id]; if (!d) return;
  d.play();
  showLabel(d.label);
  flashEl(id);
  const x = cx || W/2, y = cy || H*0.52;
  emitShockwave(x, y, d.color);
  spawnBurst(x, y, d.color, d.bursts);
  spawnGlow(x, y, d.color);
}

function flashEl(id) {
  const el = document.getElementById(id); if (!el) return;
  el.style.transition = 'filter 0s';
  el.style.filter = 'brightness(2.8) saturate(2.2)';
  setTimeout(() => { el.style.transition = 'filter 0.38s ease-out'; el.style.filter = 'brightness(1) saturate(1)'; }, 25);
}

let labTO = null;
const hitLabel = document.getElementById('hit-label');
function showLabel(t) {
  hitLabel.textContent = t; hitLabel.style.opacity = '1';
  clearTimeout(labTO); labTO = setTimeout(() => { hitLabel.style.opacity = '0'; }, 550);
}

document.querySelectorAll('.drum-clickable').forEach(el => {
  el.addEventListener('mousedown', e => { e.preventDefault(); triggerDrum(el.id, e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; triggerDrum(el.id, t.clientX, t.clientY); }, {passive:false});
});
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code==='Space') e.preventDefault();
  const id = keyMap[e.code]; if (id) triggerDrum(id, W/2, H*0.52);
});
document.getElementById('volSlider').addEventListener('input', e => { if(masterGain) masterGain.gain.value=parseFloat(e.target.value); });

// BPM / Metro
let bpm=120, metroOn=false, metroT=null, beat=0;
const bpmEl = document.getElementById('bpmDisplay');
document.getElementById('bpmDown').addEventListener('click',()=>{ bpm=Math.max(30,bpm-5); bpmEl.textContent=bpm; if(metroOn)restart(); });
document.getElementById('bpmUp').addEventListener('click',  ()=>{ bpm=Math.min(300,bpm+5); bpmEl.textContent=bpm; if(metroOn)restart(); });
function metroTick(){const ac=getAC(),t=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=beat%4===0?1100:880;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.05);beat++;metroT=setTimeout(metroTick,60000/bpm);}
function restart(){clearTimeout(metroT);beat=0;metroTick();}
document.getElementById('metroBtn').addEventListener('click',()=>{
  metroOn=!metroOn;
  const b=document.getElementById('metroBtn');
  if(metroOn){b.classList.add('active');b.textContent='■ Metronome';restart();}
  else{b.classList.remove('active');b.textContent='▶ Metronome';clearTimeout(metroT);}
});

// Waveform
const vc=document.getElementById('viz-canvas'), vx=vc.getContext('2d');
function drawViz(){
  requestAnimationFrame(drawViz);
  vx.fillStyle='rgba(12,12,12,0.9)'; vx.fillRect(0,0,vc.width,vc.height);
  if(!analyser)return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  vx.lineWidth=1.8; vx.strokeStyle='#c8963e';
  vx.shadowColor='#c8963e'; vx.shadowBlur=8;
  vx.beginPath();
  const step=vc.width/data.length;
  for(let i=0;i<data.length;i++){const y=(data[i]/128)*(vc.height/2);i===0?vx.moveTo(0,y):vx.lineTo(i*step,y);}
  vx.stroke(); vx.shadowBlur=0;
}
drawViz();
</script>
</body>
</html>
